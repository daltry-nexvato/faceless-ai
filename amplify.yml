version: 1
applications:
  - appRoot: app
    frontend:
      phases:
        preBuild:
          commands:
            - npm install -g pnpm@latest
            - pnpm install --frozen-lockfile
        build:
          commands:
            - pnpm build
        postBuild:
          commands:
            - node scripts/amplify-postbuild.mjs
      artifacts:
        baseDirectory: .amplify-hosting
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
          - .next/cache/**/*
