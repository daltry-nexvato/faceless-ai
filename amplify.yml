version: 1
applications:
  - appRoot: app
    frontend:
      phases:
        preBuild:
          commands:
            - npm install -g pnpm@latest
            - pnpm install --frozen-lockfile --shamefully-hoist
        build:
          commands:
            - pnpm build
        postBuild:
          commands:
            - bash scripts/amplify-postbuild.sh
      artifacts:
        baseDirectory: .amplify-hosting
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
